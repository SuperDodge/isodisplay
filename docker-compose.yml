version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: isodisplay-backend
    ports:
      - "5000:5000"  # backend port mapping
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: isodisplay-frontend
    ports:
      - "8080:80"  # frontend will be served by nginx
    depends_on:
      - backend
    restart: unless-stopped
