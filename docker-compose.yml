version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-me}
    ports:
      - "5001:5000"   # <-- changed
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:5000   # stays the same (in-stack DNS)
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
