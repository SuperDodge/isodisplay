version: "3.9"
services:
  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://backend:8000
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql+psycopg2://app:app@db:5432/isodisplay
      - FRONTEND_ORIGIN=http://localhost:8080
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend/uploads:/app/uploads

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=isodisplay
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
